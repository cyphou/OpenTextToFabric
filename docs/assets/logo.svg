<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004578;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#50e6ff" />
      <stop offset="100%" style="stop-color:#0078d4" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>
  <!-- OpenText doc icon -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="80" height="100" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <rect x="12" y="18" width="56" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="12" y="30" width="42" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="12" y="42" width="50" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="12" y="54" width="36" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="12" y="66" width="48" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="12" y="78" width="30" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  </g>
  <!-- Arrow -->
  <g transform="translate(140, 72)">
    <line x1="0" y1="18" x2="60" y2="18" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <polygon points="58,8 78,18 58,28" fill="#50e6ff"/>
  </g>
  <!-- Fabric diamond icon -->
  <g transform="translate(230, 40)">
    <g transform="rotate(45, 50, 50)">
      <rect x="15" y="15" width="70" height="70" rx="8" fill="rgba(255,255,255,0.15)" stroke="#50e6ff" stroke-width="2.5"/>
    </g>
    <text x="50" y="58" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#50e6ff">F</text>
  </g>
  <!-- Title -->
  <text x="370" y="78" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    OpenText → Fabric
  </text>
  <text x="370" y="112" font-family="Segoe UI, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.75)">
    Automated ECM &amp; BIRT Migration to Microsoft Fabric &amp; Power BI
  </text>
  <!-- Badges row -->
  <g transform="translate(370, 132)">
    <!-- Python badge -->
    <rect x="0" y="0" width="84" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
    <text x="42" y="16" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.85)">Python 3.12+</text>
    <!-- Zero deps badge -->
    <rect x="94" y="0" width="80" height="24" rx="12" fill="rgba(80,230,255,0.2)"/>
    <text x="134" y="16" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#50e6ff">Zero Deps</text>
    <!-- Tests badge -->
    <rect x="184" y="0" width="90" height="24" rx="12" fill="rgba(16,124,16,0.3)"/>
    <text x="229" y="16" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#92e492">405 Tests ✓</text>
    <!-- MIT badge -->
    <rect x="284" y="0" width="52" height="24" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="310" y="16" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)">MIT</text>
  </g>
</svg>
